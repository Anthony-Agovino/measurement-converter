<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MyMeasurementConverter</title>
    <meta name="theme-color" content="#0f0f0f">
    <link rel="icon" href="app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="app-icon.svg">
    <link rel="manifest" href="manifest.webmanifest?v=7">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6ee7b7"/><stop offset="100%" style="stop-color:#3b82f6"/></linearGradient></defs>
                <path d="M12 2v20M5 8h14M3 16l2-8M9 16l-2-8M15 16l2-8M21 16l-2-8M3 16h6M15 16h6"/>
            </svg>
        </div>
        <h1>MyMeasurementConverter</h1>
        <p class="subtitle">Quick & precise measurements</p>
    </header>

    <!-- Categories outside the main card, or inside? Let's put it right above the card -->
    <section class="categories">
        <button class="category-btn active" data-category="weight">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M5 8h14M3 16l2-8M9 16l-2-8M15 16l2-8M21 16l-2-8M3 16h6M15 16h6"/>
            </svg>
            Weight
        </button>
        <button class="category-btn" data-category="distance">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12H2"/>
                <path d="M5 15l-3-3 3-3"/>
                <path d="M19 9l3 3-3 3"/>
                <path d="M2 4v16"/>
                <path d="M22 4v16"/>
            </svg>
            Distance
        </button>
        <button class="category-btn" data-category="volume">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 11-4 0"/><path d="M5.52 16h12.96"/></svg>
            Volume
        </button>
        <button class="category-btn" data-category="temperature">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/><path d="M9.5 9h5"/></svg>
            Temp
        </button>
    </section>

    <!-- Main Converter Card -->
    <main class="converter-card" id="converter-box">
        
        <!-- From Section -->
        <div class="currency-section" id="from-section">
            <div class="currency-header">
                <label for="from-unit" class="visually-hidden">From</label>
                <div class="select-wrapper">
                    <select id="from-unit" class="currency-select"></select>
                    <svg class="select-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </div>
            </div>
            <label for="from-value" class="visually-hidden">Value to convert</label>
            <input type="number" id="from-value" class="currency-input" placeholder="0" value="1" step="any" autocomplete="off">
        </div>

        <!-- Swap Button -->
        <div class="swap-container">
            <button id="swap-btn" class="swap-btn" aria-label="Swap units" title="Swap units">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 16V4m0 0L3 8m4-4l4 4"/>
                    <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
                </svg>
            </button>
        </div>

        <!-- To Section -->
        <div class="currency-section" id="to-section">
            <div class="currency-header">
                <label for="to-unit" class="visually-hidden">To</label>
                <div class="select-wrapper" style="flex:1;">
                    <select id="to-unit" class="currency-select"></select>
                    <svg class="select-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </div>
                <!-- Copy Button Next to Selector in Header -->
                <button id="copy-btn" class="action-btn copy-btn" aria-label="Copy result" title="Copy result">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                </button>
            </div>
            <label for="to-value" class="visually-hidden">Converted value</label>
            <input type="number" id="to-value" class="currency-output" readonly step="any" placeholder="Result">
        </div>

        <!-- Formula Display -->
        <div class="formula-display" id="formula-display"></div>

        <!-- History -->
        <div class="history-panel" id="history-panel">
            <h3>Recent Conversions</h3>
            <div class="history-list" id="history-list"></div>
        </div>
    </main>

    <!-- Cmd+K Modal -->
    <div class="modal-overlay" id="cmd-k-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="cmd-k-input" placeholder="Type a conversion (e.g., '5 miles in km')" autocomplete="off" spellcheck="false">
                <div class="modal-esc">ESC</div>
            </div>
            <div class="modal-result" id="modal-result">
                Start typing to instantly convert...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered for offline use!'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
