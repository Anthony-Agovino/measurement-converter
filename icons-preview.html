<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Icon Preview</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0f172a; color: white; display: flex; flex-direction: column; gap: 20px; align-items: flex-start; }
        .icon-card { background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 8px; display: flex; gap: 15px; align-items: center; border: 1px solid rgba(255,255,255,0.2); }
        .icon-card svg { color: #3b82f6; width: 32px; height: 32px; }
        h2 { margin: 0; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>Weight Icon Options (Balance Scale)</h1>
    
    <div class="icon-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v18M3 14l4-8 4 8zM13 14l4-8 4 8zM7 14h10M4 14a3 3 0 006 0M14 14a3 3 0 006 0"/>
        </svg>
        <h2>Option 1: The Scales of Justice</h2>
    </div>

    <div class="icon-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M5 8h14M3 16l2-8M9 16l-2-8M15 16l2-8M21 16l-2-8M3 16h6M15 16h6"/>
        </svg>
        <h2>Option 2: Minimalist Double-Pan</h2>
    </div>

    <div class="icon-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M8 5h8"/>
            <path d="M12 21a9 9 0 009-9H3a9 9 0 009 9z"/>
        </svg>
        <h2>Option 3: Modern Dial Scale</h2>
    </div>
</body>
</html>
